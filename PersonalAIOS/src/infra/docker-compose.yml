version: "3.8"

services:
  # The isolated environment where untrusted code/skills are executed
  sandbox_executor:
    image: python:3.11-slim
    container_name: os_sandbox_executor
    network_mode: none  # Strict isolation, no network access by default
    volumes:
      - ./sandbox_data:/sandbox:rw
    command: tail -f /dev/null
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Optional local instance of an LLM server (like Ollama) for 3B models
  local_llm_engine:
    image: ollama/ollama:latest
    container_name: os_local_llm
    ports:
      - "11434:11434"
    volumes:
      - ./infra/ollama_data:/root/.ollama
